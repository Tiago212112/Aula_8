<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treinamento JS</title>
</head>
<body>

    <main>
        <h1>Treinamento JS</h1>

        <label for="numero">
            Digite 10 números
        </label>

        <input type="number" name="numero" id="numero">

        <button id="btn-add">+</button>

        <small id="contagem">Restam 10 números</small>

        <label for="inseridos">
            Números inseridos
        </label>

        <select name="inseridos" id="inseridos" size="1" multiple>
           <option value="" id="opt1"> Insira um número </option>

        </select>

        <button id="btn-remove" title="Remover número(s) selecionado(s)"> 🗑️ </button>

        <ul id="box-resultado">
            <li>Primeiro número inserido: <span id="primeiro"></span></li>
            <li>Último número inserido: <span id="ultimo"></span></li>
            <li>Soma de todos os números: <span id="soma"></span></li>
            <li>Maior número inserido: <span id="maior"></span></li>
            <li>Maior número inserido: <span id="menor"></span></li>
            
        </ul>
         <div id="box-btn">
        <button id="calcular"> Finalizar </button>
        <button id="reiniciar"> Reiniciar </button>
    </div>

    </main>


    <script src="js/script.js"></script>
    
</body>
</html>
